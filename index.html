<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A股观察与复盘</title>
<style>body{margin:auto;max-width:980px;padding:18px;background:#0b1020;color:#e8edf7;font:15px/1.65 system-ui}header{display:flex;gap:12px;align-items:center;justify-content:space-between}button{padding:9px 14px;border:0;border-radius:8px;background:#4f7cff;color:white}.tabs button.off{background:#25304b}.panel{background:#151d32;border:1px solid #263451;border-radius:12px;padding:16px;margin:12px 0}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:9px;border-bottom:1px solid #263451}.up{color:#ff6b6b}.down{color:#48d597}.muted{color:#98a5bd}@media(max-width:600px){table{font-size:12px}th,td{padding:6px}.hide-sm{display:none}}</style></head>
<body><header><div><h1>A股观察与复盘</h1><div id="meta" class="muted">加载中</div></div><button onclick="load()">刷新</button></header><div class="tabs"><button id="pre" onclick="setType('pre-market')">盘前</button><button id="after" onclick="setType('after-market')">盘后</button></div><main id="app"></main>
<script>let type='after-market';const esc=s=>String(s??'—').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function setType(t){type=t;load()}async function load(){pre.className=type==='pre-market'?'':'off';after.className=type==='after-market'?'':'off';try{let r=await fetch(`reports/${type}-latest.json?${Date.now()}`);if(!r.ok)throw Error(r.status);render(await r.json())}catch(e){app.innerHTML='<div class="panel">报告尚未生成。可在 Actions 中手动运行一次。</div>';meta.textContent='暂无数据'}}function render(d){meta.textContent=`${d.date} · ${d.data_quality.warning} · ${new Date(d.generated_at).toLocaleString()}`;let rows=d.watchlist.map(x=>`<tr><td>${esc(x.name)}<div class="muted">${esc(x.code)}</div></td><td class="${x.change_pct>0?'up':x.change_pct<0?'down':''}">${x.change_pct==null?'—':x.change_pct.toFixed(2)+'%'}</td><td class="hide-sm">${esc(x.industry)}</td><td>${esc(x.view)}</td></tr>`).join('');app.innerHTML=`<section class="panel"><h2>${esc(d.title)}</h2><p>${esc(d.market_summary)}</p></section><section class="panel"><h2>指数</h2>${d.indices.map(x=>`<p>${esc(x.name)}：<span class="${x.change_pct>0?'up':'down'}">${x.change_pct==null?'—':x.change_pct.toFixed(2)+'%'}</span> · ${esc(x.view)}</p>`).join('')}</section><section class="panel"><h2>自选观察</h2><table><thead><tr><th>标的</th><th>涨跌</th><th class="hide-sm">板块</th><th>观察</th></tr></thead><tbody>${rows}</tbody></table></section><section class="panel"><h2>风险提示</h2><ul>${d.risks.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><h2>下一步</h2><ul>${d.next_actions.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></section><p class="muted">${esc(d.disclaimer)}</p>`}load()</script></body></html>
