name: Generate A-share reports
on:
  schedule:
    # Avoid the top-of-hour congestion window documented by GitHub Actions.
    - cron: '47 0 * * 1-5'
    - cron: '26 1 * * 1-5'
    - cron: '43 7 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: Report type
        required: true
        default: after-market
        type: choice
        options: [pre-market, auction, after-market]
permissions:
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip}
      - run: pip install -r requirements.txt
      - name: Select report type
        id: type
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.report_type }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "47 0 * * 1-5" ]; then
            echo "value=pre-market" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "26 1 * * 1-5" ]; then
            echo "value=auction" >> "$GITHUB_OUTPUT"
          else
            echo "value=after-market" >> "$GITHUB_OUTPUT"
          fi
      - run: python src/report.py "${{ steps.type.outputs.value }}"
      - run: python -m unittest discover -s tests
      - name: Commit report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports
          git diff --cached --quiet || git commit -m "report: ${{ steps.type.outputs.value }} $(date -u +%F)"
          git push
